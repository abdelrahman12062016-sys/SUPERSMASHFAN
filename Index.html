<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Smash Firebase</title>
<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>

<body>

<div id="menu">
  <h1>SMASH ONLINE</h1>

  <input id="room" placeholder="ROOM CODE">

  <button onclick="join('sword')">⚔ Sword</button>
  <button onclick="join('brawler')">👊 Brawler</button>
  <button onclick="join('gunner')">🔫 Gunner</button>
</div>

<canvas id="c"></canvas>

<div id="hud"></div>

<div id="controls">
  <button id="l">◀</button>
  <button id="r">▶</button>
  <button id="j">⬆</button>
  <button id="a">⚔</button>
</div>

<script src="game.js"></script>
</body>
</html>
